<!DOCTYPE html>
<html lang="en" x-data="article" :class="htmlClass()" :style="`--fs:${fontScale/100}`" x-cloak>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="(meta.title ? meta.title + ' — ' : '') + 'The Wheelie'">The Wheelie</title>
  <meta name="description" :content="meta.dek || 'An essay from The Wheelie by Tom Easterbrook.'" />

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            display: ['"Fraunces"', "ui-serif", "Georgia", "serif"],
            body: ['"Newsreader"', "ui-serif", "Georgia", "serif"],
            ui: ['"Hanken Grotesk"', "ui-sans-serif", "system-ui", "sans-serif"],
          },
          colors: {
            paper:    "rgb(var(--paper) / <alpha-value>)",
            surface:  "rgb(var(--surface) / <alpha-value>)",
            ink:      "rgb(var(--ink) / <alpha-value>)",
            inksoft:  "rgb(var(--ink-soft) / <alpha-value>)",
            teal:     "rgb(var(--teal) / <alpha-value>)",
            tealbright:"rgb(var(--teal-bright) / <alpha-value>)",
            line:     "rgb(var(--line) / <alpha-value>)",
          },
        },
      },
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- App bundle (Alpine + components + styles) -->
  <script type="module" src="/src/main.js"></script>
</head>

<body class="grain text-ink antialiased selection:bg-teal selection:text-paper transition-colors duration-500">

  <!-- ===== Top bar ===== -->
  <div class="relative z-20 max-w-5xl mx-auto px-6">
    <div class="flex items-center justify-between py-3 text-[11px] font-ui uppercase tracking-[0.42em] text-inksoft border-b border-line">
      <a href="index.html" class="hover:text-teal transition tracking-normal">← All writing</a>
      <span x-text="`Vol. I — ${year}`"></span>
      <button @click="panelOpen = !panelOpen" class="hover:text-teal transition tracking-normal">Accessibility</button>
    </div>
  </div>

  <main class="relative z-10 max-w-5xl mx-auto px-6">

    <!-- ===== Masthead ===== -->
    <header class="text-center pt-8 pb-6">
      <div class="flex items-center justify-center gap-4 text-inksoft">
        <span class="h-px flex-1 bg-line max-w-[6rem]"></span>
        <span class="font-ui text-[10px] uppercase tracking-[0.42em]">Personal · Unfiltered</span>
        <span class="h-px flex-1 bg-line max-w-[6rem]"></span>
      </div>
      <a href="index.html" class="block font-display font-semibold tracking-tight text-5xl sm:text-7xl mt-3 leading-none">
        The Wheelie
      </a>
      <div class="double-rule mt-5 pt-2 flex items-center justify-center gap-3 font-ui text-[11px] uppercase tracking-[0.3em] text-inksoft">
        <span x-text="meta.date || '—'"></span>
        <span class="w-1 h-1 rounded-full bg-line"></span>
        <span>Notes from the front line</span>
        <span class="w-1 h-1 rounded-full bg-line"></span>
        <span>No. <span x-text="edition"></span></span>
      </div>
    </header>

    <!-- ===== Loading / error ===== -->
    <div x-show="state === 'loading'" x-cloak class="py-24 text-center font-ui text-inksoft">
      Setting the type…
    </div>
    <div x-show="state === 'error'" x-cloak class="py-24 text-center">
      <p class="font-display text-3xl mb-3">Story not found</p>
      <p class="font-ui text-inksoft mb-6" x-text="errorMsg"></p>
      <a href="index.html" class="font-ui text-teal underline">← Back to all writing</a>
    </div>

    <!-- ===== Article ===== -->
    <article x-show="state === 'ready'" x-cloak class="pb-24">

      <!-- Kicker -->
      <p class="text-center font-ui uppercase tracking-[0.3em] text-xs text-teal mt-8 mb-4" x-text="meta.category"></p>

      <!-- Headline -->
      <h1 class="font-display font-semibold text-center leading-[0.98] tracking-tight text-[clamp(2.2rem,6vw,4.5rem)] max-w-4xl mx-auto" x-text="meta.title"></h1>

      <!-- Standfirst / dek -->
      <p class="italic text-center text-xl sm:text-2xl text-inksoft mt-5 max-w-2xl mx-auto leading-snug" x-text="meta.dek"></p>

      <!-- Byline rule -->
      <div class="flex flex-wrap items-center justify-center gap-3 my-7 py-3 border-y border-line font-ui text-xs uppercase tracking-[0.2em] text-inksoft">
        <span>By <span class="text-ink font-semibold" x-text="meta.author || 'Tom Easterbrook'"></span></span>
        <span class="w-1 h-1 rounded-full bg-line"></span>
        <span x-text="meta.date"></span>
        <span class="w-1 h-1 rounded-full bg-line"></span>
        <span x-text="meta.read || readingTime"></span>
      </div>

      <!-- Optional lead image -->
      <figure x-show="meta.image" x-cloak class="mb-7">
        <img :src="meta.image" :alt="meta.title" class="w-full rounded" style="filter: grayscale(.1) contrast(1.02)" />
        <figcaption x-show="meta.caption" class="font-ui text-xs text-inksoft mt-2 text-center" x-text="meta.caption"></figcaption>
      </figure>

      <!-- Body (rendered markdown) -->
      <div class="news" x-html="html"></div>

      <!-- Footer / sign-off -->
      <div class="mt-12 pt-6 double-rule text-center">
        <p class="font-display text-2xl text-teal mb-2">✦</p>
        <p class="font-ui text-sm text-inksoft mb-6">
          Written by <span class="text-ink font-semibold" x-text="meta.author || 'Tom Easterbrook'"></span> for The Wheelie.
        </p>
        <a href="index.html" class="inline-flex items-center gap-2 font-ui font-medium text-teal">
          ← Read more essays
        </a>
      </div>
    </article>
  </main>

  <!-- ===== Accessibility panel ===== -->
  <div class="fixed bottom-5 right-5 z-40 font-ui">
    <div
      x-show="panelOpen" x-cloak @click.outside="panelOpen = false"
      x-transition
      class="mb-3 w-72 rounded-2xl border border-line bg-surface text-ink shadow-2xl p-5"
      role="dialog" aria-label="Accessibility settings"
    >
      <div class="flex items-center justify-between mb-4">
        <span class="text-xs uppercase tracking-[0.2em] text-inksoft">Accessibility</span>
        <button @click="panelOpen = false" aria-label="Close" class="text-inksoft hover:text-teal text-lg leading-none">&times;</button>
      </div>

      <!-- Text size -->
      <p class="text-sm font-semibold mb-2">Text size</p>
      <div class="flex items-center gap-2 mb-5">
        <button @click="bumpScale(-10)" aria-label="Decrease text size" class="flex-1 py-2 rounded-lg border border-line hover:border-teal hover:text-teal transition">A<span class="text-xs">−</span></button>
        <button @click="resetScale()" class="px-3 py-2 rounded-lg border border-line text-xs tabular-nums hover:border-teal hover:text-teal transition" x-text="fontScale + '%'"></button>
        <button @click="bumpScale(10)" aria-label="Increase text size" class="flex-1 py-2 rounded-lg border border-line hover:border-teal hover:text-teal transition text-lg">A<span class="text-xs">+</span></button>
      </div>

      <!-- Typeface -->
      <p class="text-sm font-semibold mb-2">Typeface</p>
      <div class="grid grid-cols-3 gap-2 mb-5">
        <button @click="setFont('serif')" :class="font === 'serif' ? 'border-teal text-teal bg-teal/10' : 'border-line hover:border-teal'" class="py-2 rounded-lg border text-sm transition" style="font-family:'Newsreader',serif">Serif</button>
        <button @click="setFont('sans')" :class="font === 'sans' ? 'border-teal text-teal bg-teal/10' : 'border-line hover:border-teal'" class="py-2 rounded-lg border text-sm transition" style="font-family:'Atkinson Hyperlegible',sans-serif">Sans</button>
        <button @click="setFont('dyslexic')" :class="font === 'dyslexic' ? 'border-teal text-teal bg-teal/10' : 'border-line hover:border-teal'" class="py-2 rounded-lg border text-xs transition" style="font-family:'OpenDyslexic','Atkinson Hyperlegible',sans-serif" title="Dyslexia-friendly">Dyslexic</button>
      </div>

      <!-- Background -->
      <p class="text-sm font-semibold mb-2">Background</p>
      <div class="grid grid-cols-4 gap-2">
        <template x-for="opt in themes" :key="opt.k">
          <button
            @click="setTheme(opt.k)"
            :class="theme === opt.k ? 'ring-2 ring-teal' : 'ring-1 ring-line'"
            :style="opt.swatch"
            class="py-3 rounded-lg text-[11px] font-semibold transition"
            x-text="opt.l"
          ></button>
        </template>
      </div>
    </div>

    <button
      @click="panelOpen = !panelOpen"
      class="flex items-center gap-2 px-4 py-3 rounded-full bg-ink text-paper shadow-xl hover:bg-teal transition"
      :aria-expanded="panelOpen" aria-label="Accessibility options"
    >
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="3.5" r="2"/><path d="M21 8.5c0 .7-.6 1.2-1.3 1.1l-4.2-.6v3.2l2.3 7.6c.2.7-.2 1.4-.9 1.6-.7.2-1.4-.2-1.6-.9L12 14.5l-2.3 6.6c-.2.7-.9 1.1-1.6.9-.7-.2-1.1-.9-.9-1.6l2.3-7.6V9l-4.2.6C4.6 9.7 4 9.2 4 8.5c0-.6.4-1.1 1-1.2L10 6.5h4l5 .8c.6.1 1 .6 1 1.2z"/></svg>
      <span class="text-sm font-medium hidden sm:inline">Accessibility</span>
    </button>
  </div>

</body>
</html>
